spring:
  application:
    name: employee-management-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl=false&serverTimezone=Africa/Nairobi
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  hikari:
    maximum-pool-size: 10
    minimum-idle: 5
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
    pool-name: AuthHikariCp

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public
    baseline-version: 0
    validate-on-migrate: true



  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAILTRAP_USERNAME}
    password: ${MAILTRAP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
app:
  frontend-url: http://localhost:5173   # used to build invite/reset links
  invite-token-expiry-hours: 48
  reset-token-expiry-hours: 1
#springdoc:
